apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-core
  namespace: uniserve
spec:
  replicas: 2
  selector:
    matchLabels: { app: ai-core }
  template:
    metadata:
      labels: { app: ai-core }
    spec:
      containers:
        - name: ai-core
          image: uniserve/ai-core:dev
          ports:
            - containerPort: 8001
          env:
            - name: APP_ENV
              value: "production"
            - name: VALKEY_URL
              value: "redis://valkey:6379"
            - name: DB_WRITER_URL
              value: "http://db-writer:8090"
          livenessProbe:
            httpGet: { path: /q/health/live, port: 8001 }
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /q/health/ready, port: 8001 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-core
  namespace: uniserve
spec:
  selector: { app: ai-core }
  ports:
    - port: 8001
      targetPort: 8001
