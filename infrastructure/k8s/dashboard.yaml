apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: uniserve
spec:
  replicas: 2
  selector:
    matchLabels: { app: dashboard }
  template:
    metadata:
      labels: { app: dashboard }
    spec:
      containers:
        - name: dashboard
          image: uniserve/dashboard:dev
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_GATEWAY_URL
              value: "http://api-gateway:8080"
          livenessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: uniserve
spec:
  type: LoadBalancer
  selector: { app: dashboard }
  ports:
    - port: 80
      targetPort: 3000
