apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: uniserve
spec:
  replicas: 1
  selector:
    matchLabels: { app: valkey }
  template:
    metadata:
      labels: { app: valkey }
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:8-alpine
          args: ["valkey-server", "--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: uniserve
spec:
  selector: { app: valkey }
  ports:
    - port: 6379
      targetPort: 6379
