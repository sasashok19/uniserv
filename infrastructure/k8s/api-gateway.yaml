apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: uniserve
spec:
  replicas: 2
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
    spec:
      containers:
        - name: api-gateway
          image: uniserve/api-gateway:dev
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: "production"
            - name: GATEWAY_VALKEY_URL
              value: "redis://valkey:6379"
            - name: AI_CORE_URL
              value: "http://ai-core:8001"
            - name: DB_WRITER_URL
              value: "http://db-writer:8090"
          livenessProbe:
            httpGet: { path: /q/health/live, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /q/health/ready, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: uniserve
spec:
  selector: { app: api-gateway }
  ports:
    - port: 8080
      targetPort: 8080
