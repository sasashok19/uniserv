# ============================================================
# UniServe :: local development stack (Phase 1)
# Usage (from repo root):
#   docker compose -f infrastructure/compose/docker-compose.dev.yml up --build
#
# Ports (host):
#   api-gateway 8080 | db-writer 8090 | ai-core 8001 | dashboard 3000 | valkey 6379
# ============================================================

name: uniserve-dev

services:
  valkey:
    image: valkey/valkey:8-alpine
    container_name: uniserve-valkey
    ports:
      - "6379:6379"
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  db-writer:
    build:
      context: ../../services/db-writer
      dockerfile: Dockerfile
    container_name: uniserve-db-writer
    environment:
      APP_ENV: development
      TENANT_ID: t1
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DB_WRITER_DB_PATH: /data/uniserve.db
    ports:
      - "8090:8090"
    volumes:
      - db-data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8090/q/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  ai-core:
    build:
      context: ../../services/ai-core
      dockerfile: Dockerfile
    container_name: uniserve-ai-core
    environment:
      APP_ENV: development
      TENANT_ID: t1
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      VALKEY_URL: redis://valkey:6379
      EVENT_BUS_MAX_RETRIES: "3"
      EVENT_BUS_RETRY_DELAY_MS: "1000"
      EVENT_BUS_CONSUMER_GROUP: uniserve
      DB_WRITER_URL: http://db-writer:8090
      API_GATEWAY_URL: http://api-gateway:8080
      DEFAULT_LLM_PROVIDER: anthropic
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_ASSISTANT_ID: ${OPENAI_ASSISTANT_ID:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "8001:8001"
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8001/q/health/ready').status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api-gateway:
    build:
      context: ../../services/api-gateway
      dockerfile: Dockerfile
    container_name: uniserve-api-gateway
    environment:
      APP_ENV: development
      TENANT_ID: t1
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GATEWAY_VALKEY_URL: redis://valkey:6379
      AI_CORE_URL: http://ai-core:8001
      DB_WRITER_URL: http://db-writer:8090
      # WhatsApp adapter (Feature 02b) — dev handshake/HMAC bypass token
      WHATSAPP_VERIFY_TOKEN: dev-verify-token
      # Email adapter (Feature 02a) — same Gmail App Password covers both
      # directions; pulled from the shell/root .env, never hardcoded here.
      # Outbound SMTP — real send by default (quarkus.mailer.mock defaults to false).
      EMAIL_SMTP_MOCK: ${EMAIL_SMTP_MOCK:-false}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-smtp.gmail.com}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER:-}
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-}
      # Inbound IMAP polling — EMAIL_IMAP_USER/PASSWORD default to the SMTP
      # ones above (application.properties nested-default) if left unset.
      EMAIL_IMAP_HOST: ${EMAIL_IMAP_HOST:-imap.gmail.com}
      EMAIL_IMAP_PORT: ${EMAIL_IMAP_PORT:-993}
      EMAIL_IMAP_MAILBOX: ${EMAIL_IMAP_MAILBOX:-INBOX}
      EMAIL_IMAP_POLL_INTERVAL: ${EMAIL_IMAP_POLL_INTERVAL:-60s}
      EMAIL_IMAP_USER: ${EMAIL_IMAP_USER:-}
      EMAIL_IMAP_PASSWORD: ${EMAIL_IMAP_PASSWORD:-}
    ports:
      - "8080:8080"
    depends_on:
      valkey:
        condition: service_healthy
      db-writer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8080/q/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  dashboard:
    build:
      context: ../../apps/dashboard
      dockerfile: Dockerfile
    container_name: uniserve-dashboard
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:8080
      # Server-side (SSR / route handlers) reach the gateway by service name.
      API_GATEWAY_INTERNAL_URL: http://api-gateway:8080
      NEXT_PUBLIC_TENANT_ID: t1
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

volumes:
  db-data:
