# ============================================================
# UniServe :: api-gateway :: application.properties
# Phase 1 scaffold — health check only, no feature logic yet.
# ============================================================

quarkus.application.name=api-gateway
quarkus.http.port=8080

# --- Structured JSON logging (ORCHESTRATOR convention) ---
quarkus.log.console.json=true
quarkus.log.level=INFO

# --- Health (SmallRye) ---
# Liveness:  /q/health/live
# Readiness: /q/health/ready
# Aggregate: /q/health
quarkus.smallrye-health.root-path=/q/health

# --- Valkey (Redis-compatible) event bus ---
quarkus.redis.hosts=${GATEWAY_VALKEY_URL:redis://localhost:6379}

# --- App environment ---
app.env=${APP_ENV:development}
# Dev data seeding (Features 02a/02b): 5 email + 5 whatsapp events on startup.
dev.seed.enabled=${DEV_SEED_ENABLED:true}

# --- Mailer (Phase 1 outbound email / Feature 02a SMTP) ---
# PHASE_1: dev mailer just logs messages; real SMTP wired in 14_NOTIFICATIONS.
quarkus.mailer.from=${EMAIL_FROM_ADDRESS:${GATEWAY_MAIL_FROM:noreply@uniserve.local}}
quarkus.mailer.mock=true

# --- Email adapter: IMAP inbound (Feature 02a) ---
# Empty host (dev default) => polling is skipped and manual poll returns 0/0.
email.poll.interval=${EMAIL_IMAP_POLL_INTERVAL:60s}
email.imap.host=${EMAIL_IMAP_HOST:}
email.imap.port=${EMAIL_IMAP_PORT:993}
email.imap.user=${EMAIL_IMAP_USER:}
email.imap.password=${EMAIL_IMAP_PASSWORD:}
email.imap.mailbox=${EMAIL_IMAP_MAILBOX:INBOX}

# --- WhatsApp adapter (Feature 02b) ---
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN:dev-verify-token}
whatsapp.app-secret=${WHATSAPP_APP_SECRET:}
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}

# --- JWT auth (Feature 11) — HS256 via java-jwt + custom AuthFilter ---
# Disable the MP-JWT (SmallRye) auth mechanism: we verify Bearer tokens ourselves
# in AuthFilter, so the built-in mechanism must not intercept/reject them first.
quarkus.smallrye-jwt.enabled=false
jwt.secret=${JWT_SECRET:change-me-to-a-min-64-char-secret-change-me-to-a-min-64-char-secret}
jwt.expiry.access=${JWT_EXPIRY_ACCESS:15m}
jwt.expiry.refresh=${JWT_EXPIRY_REFRESH:7d}

# --- AI core / db-writer downstream URLs ---
# PHASE_1: used once adapters/feature endpoints are implemented.
gateway.ai-core.url=${AI_CORE_URL:http://localhost:8001}
gateway.db-writer.url=${DB_WRITER_URL:http://localhost:8090}
gateway.tenant-id=${TENANT_ID:default}

# --- Dev profile ---
%dev.quarkus.log.console.json=false
%dev.quarkus.http.port=8080
