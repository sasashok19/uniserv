# ============================================================
# UniServe :: api-gateway :: application.properties
# Phase 1 scaffold — health check only, no feature logic yet.
# ============================================================

quarkus.application.name=api-gateway
quarkus.http.port=8080

# --- Structured JSON logging (ORCHESTRATOR convention) ---
quarkus.log.console.json=true
# INFO (default) logs info/warn/error — i.e. everything Phase 1 emits. Set
# LOG_LEVEL=ERROR in production to silence routine info/warn traffic.
quarkus.log.level=${LOG_LEVEL:INFO}

# --- Health (SmallRye) ---
# Liveness:  /q/health/live
# Readiness: /q/health/ready
# Aggregate: /q/health
quarkus.smallrye-health.root-path=/q/health

# --- Valkey (Redis-compatible) event bus ---
quarkus.redis.hosts=${GATEWAY_VALKEY_URL:redis://localhost:6379}

# --- App environment ---
app.env=${APP_ENV:development}
# Dev data seeding (Features 02a/02b): 5 email + 5 whatsapp events on startup.
dev.seed.enabled=${DEV_SEED_ENABLED:true}

# --- Mailer (Phase 1 outbound email / Feature 02a SMTP) ---
# Real send by default once EMAIL_SMTP_* are set; EMAIL_SMTP_MOCK=true is the
# kill-switch to fall back to logging without touching credentials.
quarkus.mailer.mock=${EMAIL_SMTP_MOCK:false}
quarkus.mailer.host=${EMAIL_SMTP_HOST:smtp.gmail.com}
quarkus.mailer.port=${EMAIL_SMTP_PORT:587}
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.username=${EMAIL_SMTP_USER:}
quarkus.mailer.password=${EMAIL_SMTP_PASSWORD:}
# Gmail advertises XOAUTH2 first; without this, the mailer tries XOAUTH2 (no
# token available) instead of the App Password and every send fails.
quarkus.mailer.auth-methods=PLAIN LOGIN
quarkus.mailer.from=${EMAIL_FROM_ADDRESS:${GATEWAY_MAIL_FROM:noreply@uniserve.local}}

# --- Email adapter: inbound IMAP polling (Feature 02a) ---
# Same Gmail App Password as outbound SMTP — App Passwords work for both
# IMAP and SMTP once 2-Step Verification is enabled (see docs/02a notes).
email.poll.interval=${EMAIL_IMAP_POLL_INTERVAL:60s}
email.imap.host=${EMAIL_IMAP_HOST:imap.gmail.com}
email.imap.port=${EMAIL_IMAP_PORT:993}
email.imap.user=${EMAIL_IMAP_USER:${EMAIL_SMTP_USER:}}
email.imap.password=${EMAIL_IMAP_PASSWORD:${EMAIL_SMTP_PASSWORD:}}
email.imap.mailbox=${EMAIL_IMAP_MAILBOX:INBOX}

# --- Ticket auto-close (Feature 06 x 14) ---
# Tickets still awaiting identity confirmation after 14 days with no citizen
# response are auto-closed; this controls how often that sweep runs.
ticket.auto-close.interval=${TICKET_AUTO_CLOSE_INTERVAL:1h}

# --- WhatsApp adapter (Feature 02b) ---
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN:dev-verify-token}
whatsapp.app-secret=${WHATSAPP_APP_SECRET:}
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}

# --- JWT auth (Feature 11) — HS256 via java-jwt + custom AuthFilter ---
# Disable the MP-JWT (SmallRye) auth mechanism: we verify Bearer tokens ourselves
# in AuthFilter, so the built-in mechanism must not intercept/reject them first.
quarkus.smallrye-jwt.enabled=false
jwt.secret=${JWT_SECRET:change-me-to-a-min-64-char-secret-change-me-to-a-min-64-char-secret}
jwt.expiry.access=${JWT_EXPIRY_ACCESS:15m}
jwt.expiry.refresh=${JWT_EXPIRY_REFRESH:7d}

# --- AI core / db-writer downstream URLs ---
# PHASE_1: used once adapters/feature endpoints are implemented.
gateway.ai-core.url=${AI_CORE_URL:http://localhost:8001}
gateway.db-writer.url=${DB_WRITER_URL:http://localhost:8090}
# t1 ("TNEB Demo") is the Flyway-seeded demo tenant the dev agents belong to
# (admin/lead/agent@tneb.demo) — default here so a fresh clone's data lands
# where those logins can actually see it.
gateway.tenant-id=${TENANT_ID:t1}
# Shared pod-to-pod secret for db-writer's X-Internal-Key filter (see
# InternalKeyFilter) — must match DB_WRITER_INTERNAL_API_KEY on db-writer
# itself (and on ai-core, which calls db-writer too). Blank = dev no-op.
db-writer.internal-api-key=${DB_WRITER_INTERNAL_API_KEY:}

# --- Dev profile ---
%dev.quarkus.log.console.json=false
%dev.quarkus.http.port=8080
# Local dev (scripts/dev-local.sh, RUN_MODE=local): faster hot reload, less noise.
%dev.quarkus.live-reload.instrumentation=true
%dev.quarkus.banner.enabled=false
