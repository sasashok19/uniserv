# ============================================================
# UniServe :: db-writer :: application.properties
# Phase 1 scaffold — sole DB writer. Health check only for now;
# entities + migrations land in 05_TICKET_SCHEMA / 04_DB_WRITER_SERVICE.
# ============================================================

quarkus.application.name=db-writer
quarkus.http.port=8090

# --- Structured JSON logging (ORCHESTRATOR convention) ---
quarkus.log.console.json=true
quarkus.log.level=INFO

# --- Health (SmallRye) ---
quarkus.smallrye-health.root-path=/q/health

# --- SQLite (WAL mode) via generic JDBC ---
quarkus.datasource.db-kind=other
quarkus.datasource.jdbc.driver=org.sqlite.JDBC
quarkus.datasource.jdbc.url=jdbc:sqlite:${DB_WRITER_DB_PATH:uniserve.db}?journal_mode=WAL&busy_timeout=5000
# SQLite is single-writer; keep the pool tiny so writes serialise cleanly.
quarkus.datasource.jdbc.max-size=1

# --- Hibernate ORM ---
quarkus.hibernate-orm.dialect=org.hibernate.community.dialect.SQLiteDialect
# PHASE_1: no entities yet — schema is owned by Flyway (see 05_TICKET_SCHEMA).
quarkus.hibernate-orm.database.generation=none

# --- Flyway migrations ---
# PHASE_1: enabled once migration scripts exist (05_TICKET_SCHEMA).
quarkus.flyway.migrate-at-start=false
quarkus.flyway.locations=db/migration

# --- Read cache (Caffeine, wired in 04_DB_WRITER_SERVICE) ---
# quarkus-cache uses Caffeine by default; named caches added per feature.

quarkus.datasource.health.enabled=true

# --- Dev profile ---
%dev.quarkus.log.console.json=false
